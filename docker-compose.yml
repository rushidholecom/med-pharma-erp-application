name: ${COMPOSE_PROJECT_NAME:-pharma-erp-platform}

x-peer-service-urls: &peer-service-urls
  AUTH_SERVICE_URL: http://auth-service:8081/api/v1
  EMPLOYEE_SERVICE_URL: http://employee-service:8082/api/v1
  CATALOG_SERVICE_URL: http://medicine-catalog-service:8083/api/v1
  INVENTORY_SERVICE_URL: http://inventory-service:8084/api/v1
  PROCUREMENT_SERVICE_URL: http://procurement-service:8085/api/v1
  SALES_SERVICE_URL: http://sales-distribution-service:8086/api/v1
  PRODUCTION_SERVICE_URL: http://production-batch-service:8087/api/v1
  QUALITY_SERVICE_URL: http://quality-control-service:8088/api/v1
  WAREHOUSE_SERVICE_URL: http://warehouse-logistics-service:8089/api/v1
  FINANCE_SERVICE_URL: http://finance-billing-service:8090/api/v1

x-backend-service: &backend-service
  restart: unless-stopped
  env_file:
    - .env

x-frontend-build-args: &frontend-build-args
  VITE_AUTH_SERVICE_URL: ${VITE_AUTH_SERVICE_URL:-/proxy/auth-service}
  VITE_EMPLOYEE_SERVICE_URL: ${VITE_EMPLOYEE_SERVICE_URL:-/proxy/employee-service}
  VITE_CATALOG_SERVICE_URL: ${VITE_CATALOG_SERVICE_URL:-/proxy/medicine-catalog-service}
  VITE_INVENTORY_SERVICE_URL: ${VITE_INVENTORY_SERVICE_URL:-/proxy/inventory-service}
  VITE_PROCUREMENT_SERVICE_URL: ${VITE_PROCUREMENT_SERVICE_URL:-/proxy/procurement-service}
  VITE_SALES_SERVICE_URL: ${VITE_SALES_SERVICE_URL:-/proxy/sales-distribution-service}
  VITE_PRODUCTION_SERVICE_URL: ${VITE_PRODUCTION_SERVICE_URL:-/proxy/production-batch-service}
  VITE_QUALITY_SERVICE_URL: ${VITE_QUALITY_SERVICE_URL:-/proxy/quality-control-service}
  VITE_WAREHOUSE_SERVICE_URL: ${VITE_WAREHOUSE_SERVICE_URL:-/proxy/warehouse-logistics-service}
  VITE_FINANCE_SERVICE_URL: ${VITE_FINANCE_SERVICE_URL:-/proxy/finance-billing-service}

services:
  mongodb:
    profiles:
      - local-db
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-pharmaadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change-me}
    volumes:
      - mongodb_data:/data/db

  auth-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE_DIR: auth-service
    image: pharma-erp-auth-service:local
    ports:
      - "${AUTH_SERVICE_HOST_PORT:-8081}:8081"
    environment:
      <<: *peer-service-urls

  employee-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE_DIR: employee-service
    image: pharma-erp-employee-service:local
    ports:
      - "${EMPLOYEE_SERVICE_HOST_PORT:-8082}:8082"
    environment:
      <<: *peer-service-urls

  medicine-catalog-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE_DIR: medicine-catalog-service
    image: pharma-erp-medicine-catalog-service:local
    ports:
      - "${MEDICINE_CATALOG_SERVICE_HOST_PORT:-8083}:8083"
    environment:
      <<: *peer-service-urls

  inventory-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE_DIR: inventory-service
    image: pharma-erp-inventory-service:local
    ports:
      - "${INVENTORY_SERVICE_HOST_PORT:-8084}:8084"
    environment:
      <<: *peer-service-urls

  procurement-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE_DIR: procurement-service
    image: pharma-erp-procurement-service:local
    ports:
      - "${PROCUREMENT_SERVICE_HOST_PORT:-8085}:8085"
    environment:
      <<: *peer-service-urls

  sales-distribution-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE_DIR: sales-distribution-service
    image: pharma-erp-sales-distribution-service:local
    ports:
      - "${SALES_DISTRIBUTION_SERVICE_HOST_PORT:-8086}:8086"
    environment:
      <<: *peer-service-urls

  production-batch-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE_DIR: production-batch-service
    image: pharma-erp-production-batch-service:local
    ports:
      - "${PRODUCTION_BATCH_SERVICE_HOST_PORT:-8087}:8087"
    environment:
      <<: *peer-service-urls

  quality-control-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE_DIR: quality-control-service
    image: pharma-erp-quality-control-service:local
    ports:
      - "${QUALITY_CONTROL_SERVICE_HOST_PORT:-8088}:8088"
    environment:
      <<: *peer-service-urls

  warehouse-logistics-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE_DIR: warehouse-logistics-service
    image: pharma-erp-warehouse-logistics-service:local
    ports:
      - "${WAREHOUSE_LOGISTICS_SERVICE_HOST_PORT:-8089}:8089"
    environment:
      <<: *peer-service-urls

  finance-billing-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE_DIR: finance-billing-service
    image: pharma-erp-finance-billing-service:local
    ports:
      - "${FINANCE_BILLING_SERVICE_HOST_PORT:-8090}:8090"
    environment:
      <<: *peer-service-urls

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        <<: *frontend-build-args
    image: pharma-erp-frontend:local
    restart: unless-stopped
    depends_on:
      - auth-service
      - employee-service
      - medicine-catalog-service
      - inventory-service
      - procurement-service
      - sales-distribution-service
      - production-batch-service
      - quality-control-service
      - warehouse-logistics-service
      - finance-billing-service
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"

volumes:
  mongodb_data:
