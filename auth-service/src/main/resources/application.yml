server:
  port: 8081
  servlet:
    context-path: /api/v1

spring:
  application:
    name: auth-service
  data:
    mongodb:
      uri: ${AUTH_MONGODB_URI:${MONGODB_URI:mongodb://localhost:27017/pharma_auth_db}}
      database: ${AUTH_MONGODB_DATABASE:pharma_auth_db}
      auto-index-creation: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.pharma.erp.auth: INFO

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

services:
  auth-service:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081/api/v1}
  employee-service:
    base-url: ${EMPLOYEE_SERVICE_URL:http://localhost:8082/api/v1}
  medicine-catalog-service:
    base-url: ${CATALOG_SERVICE_URL:http://localhost:8083/api/v1}
  inventory-service:
    base-url: ${INVENTORY_SERVICE_URL:http://localhost:8084/api/v1}
  procurement-service:
    base-url: ${PROCUREMENT_SERVICE_URL:http://localhost:8085/api/v1}
  sales-distribution-service:
    base-url: ${SALES_SERVICE_URL:http://localhost:8086/api/v1}
  production-batch-service:
    base-url: ${PRODUCTION_SERVICE_URL:http://localhost:8087/api/v1}
  quality-control-service:
    base-url: ${QUALITY_SERVICE_URL:http://localhost:8088/api/v1}
  warehouse-logistics-service:
    base-url: ${WAREHOUSE_SERVICE_URL:http://localhost:8089/api/v1}
  finance-billing-service:
    base-url: ${FINANCE_SERVICE_URL:http://localhost:8090/api/v1}
