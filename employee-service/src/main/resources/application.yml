server:
  port: 8082

spring:
  application:
    name: employee-service
  data:
    mongodb:
      uri: ${EMPLOYEE_MONGODB_URI:${MONGODB_URI:mongodb://localhost:27017/pharma_employee_db}}
      auto-index-creation: true

app:
  services:
    peers:
      auth-service: ${AUTH_SERVICE_URL:http://localhost:8081}
      employee-service: ${EMPLOYEE_SERVICE_URL:http://localhost:8082}
      medicine-catalog-service: ${CATALOG_SERVICE_URL:http://localhost:8083}
      inventory-service: ${INVENTORY_SERVICE_URL:http://localhost:8084}
      procurement-service: ${PROCUREMENT_SERVICE_URL:http://localhost:8085}
      sales-distribution-service: ${SALES_SERVICE_URL:http://localhost:8086}
      production-batch-service: ${PRODUCTION_SERVICE_URL:http://localhost:8087}
      quality-control-service: ${QUALITY_SERVICE_URL:http://localhost:8088}
      warehouse-logistics-service: ${WAREHOUSE_SERVICE_URL:http://localhost:8089}
      finance-billing-service: ${FINANCE_SERVICE_URL:http://localhost:8090}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
